# herdr-plugin.toml — manifest for herdr-space-scoped-agents.
#
# Scopes the agent panel to the focused space (mode "current") or shows every
# space (mode "all") by driving Herdr's transient agent view over the API
# socket. The chosen mode is persisted in the plugin state dir; the
# workspace.focused hook runs "sync" to (re)assert it on every space switch.
#
# Distribution: [[build]] runs at `herdr plugin install` time. The per-platform
# fetch-or-build script downloads the prebuilt binary matching this version and
# platform from GitHub Releases and verifies its SHA-256; on any miss it falls
# back to `go build` (so a Go toolchain is only needed when no prebuilt exists).
#
# Windows notes (following the herdr-file-viewer plugin's verified findings):
#  - Actions need a UNIQUE id even across platforms — Herdr rejects duplicate
#    action ids at load time regardless of platform gating. The Windows
#    launchers therefore use `-windows`-suffixed ids; bind THOSE on Windows.
#  - Herdr cannot reliably spawn a relative program on Windows, so every
#    command launches the binary BY ABSOLUTE PATH via $HERDR_PLUGIN_ROOT
#    (stripping the `\\?\` verbatim prefix Herdr may report).

id = "herdr-space-scoped-agents"
name = "Space-Scoped Agents"
version = "0.2.2" # x-release-please-version
min_herdr_version = "0.7.5"
description = "Scope the agent panel to the space you're focused on."
platforms = ["linux", "macos", "windows"]

# --- Install-time build ------------------------------------------------------

[[build]]
platforms = ["linux", "macos"]
command = ["/bin/sh", "scripts/fetch-or-build.sh"]

[[build]]
platforms = ["windows"]
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "scripts/fetch-or-build.ps1"]

# --- Automatic behaviour: re-assert the active mode on every space switch -----
# Runs "sync", which applies the persisted mode ("current" scopes to the focused
# space; "all" leaves every space visible). This is what makes the "all" choice
# stick instead of being overwritten on the next focus change.

[[events]]
on = "workspace.focused"
platforms = ["linux", "macos"]
command = ["/bin/sh", "-c", 'exec "$HERDR_PLUGIN_ROOT/bin/herdr-space-scoped-agents" sync']

[[events]]
on = "workspace.focused"
platforms = ["windows"]
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", '''$p=$env:HERDR_PLUGIN_ROOT; if($p -and $p.StartsWith('\\?\')){$p=$p.Substring(4)}; & (Join-Path $p 'bin\herdr-space-scoped-agents.exe') sync''']

# --- Manual toggles (bind to a key or run from the command palette) -----------
# enable -> mode "current", clear -> mode "all", toggle -> flip. Each persists
# the mode so it sticks across space switches and restarts.

[[actions]]
id = "enable"
platforms = ["linux", "macos"]
title = "Space scope: only current space"
description = "Scope the agent panel to the focused space (persists)"
contexts = ["global"]
command = ["/bin/sh", "-c", 'exec "$HERDR_PLUGIN_ROOT/bin/herdr-space-scoped-agents" apply']

[[actions]]
id = "clear"
platforms = ["linux", "macos"]
title = "Space scope: show all agents"
description = "Show agents from every space (persists)"
contexts = ["global"]
command = ["/bin/sh", "-c", 'exec "$HERDR_PLUGIN_ROOT/bin/herdr-space-scoped-agents" clear']

[[actions]]
id = "toggle"
platforms = ["linux", "macos"]
title = "Space scope: toggle current/all"
description = "Flip between current-space-only and all-spaces (persists)"
contexts = ["global"]
command = ["/bin/sh", "-c", 'exec "$HERDR_PLUGIN_ROOT/bin/herdr-space-scoped-agents" toggle']

[[actions]]
id = "enable-windows"
platforms = ["windows"]
title = "Space scope: only current space"
description = "Scope the agent panel to the focused space (persists)"
contexts = ["global"]
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", '''$p=$env:HERDR_PLUGIN_ROOT; if($p -and $p.StartsWith('\\?\')){$p=$p.Substring(4)}; & (Join-Path $p 'bin\herdr-space-scoped-agents.exe') apply''']

[[actions]]
id = "clear-windows"
platforms = ["windows"]
title = "Space scope: show all agents"
description = "Show agents from every space (persists)"
contexts = ["global"]
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", '''$p=$env:HERDR_PLUGIN_ROOT; if($p -and $p.StartsWith('\\?\')){$p=$p.Substring(4)}; & (Join-Path $p 'bin\herdr-space-scoped-agents.exe') clear''']

[[actions]]
id = "toggle-windows"
platforms = ["windows"]
title = "Space scope: toggle current/all"
description = "Flip between current-space-only and all-spaces (persists)"
contexts = ["global"]
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", '''$p=$env:HERDR_PLUGIN_ROOT; if($p -and $p.StartsWith('\\?\')){$p=$p.Substring(4)}; & (Join-Path $p 'bin\herdr-space-scoped-agents.exe') toggle''']
